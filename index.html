<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBA Finder Pro</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:#fff;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{
padding:12px;
}

.card{
background:#fff;
padding:14px;
margin-bottom:12px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

input,select,button{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
}

button{
background:#111;
color:#fff;
cursor:pointer;
border:none;
}

.result{
margin-top:10px;
background:#eef;
padding:10px;
border-radius:8px;
}
</style>

</head>

<body>

<header>
🚀 FBA Finder Pro
</header>

<div class="container">

<div class="card">

<h3>🔎 Recherche produit</h3>

<input id="q" placeholder="Ex: lego">

<select id="site">
<option value="amazon">Amazon</option>
<option value="action">Action</option>
<option value="lidl">Lidl</option>
<option value="aldi">Aldi</option>
<option value="carrefour">Carrefour</option>
<option value="leclerc">Leclerc</option>
<option value="auchan">Auchan</option>
<option value="cultura">Cultura</option>
<option value="joueclub">JouéClub</option>
<option value="smyths">Smyths</option>
</select>

<button onclick="search()">Rechercher</button>

<div id="r" class="result"></div>

</div>

<div class="card">

<h3>💰 Calcul rentabilité</h3>

<input id="buy" placeholder="Prix achat">

<input id="sell" placeholder="Prix Amazon">

<input id="fee" placeholder="Frais Amazon">

<button onclick="calc()">Calculer</button>

<div id="c" class="result"></div>

</div>

<div class="card">

<h3>🤖 IA Opportunités</h3>

<button onclick="ia()">Trouver opportunités</button>

<div id="ia" class="result"></div>

</div>

</div>

<script>

function search(){

let q=document.getElementById("q").value;

let s=document.getElementById("site").value;

if(!q) return;

let base={

amazon:"https://www.amazon.fr/s?k=",

action:"https://www.action.com/fr-fr/search/?q=",

lidl:"https://www.lidl.fr/q/search?q=",

aldi:"https://www.aldi.fr/search?q=",

carrefour:"https://www.carrefour.fr/s?q=",

leclerc:"https://www.e.leclerc/recherche?q=",

auchan:"https://www.auchan.fr/recherche?text=",

cultura:"https://www.cultura.com/search?q=",

joueclub:"https://www.joueclub.fr/search?q=",

smyths:"https://www.smythstoys.com/search?q="

};

let url=base[s]+q;

document.getElementById("r").innerHTML=

"<a href='"+url+"' target='_blank'>Voir résultats</a>";

}

function calc(){

let b=parseFloat(document.getElementById("buy").value);

let s=parseFloat(document.getElementById("sell").value);

let f=parseFloat(document.getElementById("fee").value);

if(isNaN(b)||isNaN(s)||isNaN(f)) return;

let profit=s-f-b;

let roi=(profit/b)*100;

document.getElementById("c").innerHTML=

"Profit: "+profit.toFixed(2)+" €<br>ROI: "+roi.toFixed(1)+" %";

}

function ia(){

let items=[

"jouet éducatif",

"organisation maison",

"outil bricolage",

"accessoire cuisine",

"gadget électronique",

"produit beauté"

];

let html="<b>🔥 Top idées :</b><br><br>";

items.forEach(i=>{

html+="📦 "+i+"<br>";

html+="<a target='_blank' href='https://www.amazon.fr/s?k="+i+"'>Tester sur Amazon</a><br><br>";

});

document.getElementById("ia").innerHTML=html;

}

</script>

</body>

</html>
