<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBA Finder Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: white;
}

/* HEADER */
.header {
    background: #151821;
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 1px solid #222;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

/* CARD */
.card {
    background: #1a1d26;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 25px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

/* TITRE */
h2 {
    margin-bottom: 15px;
}

/* INPUT */
input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
    background: #2a2e3a;
    color: white;
}

/* BOUTON */
button {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #4f8cff, #6a5cff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.02);
    opacity: 0.9;
}

/* RESULT */
.result {
    margin-top: 10px;
    padding: 10px;
    background: #111;
    border-radius: 8px;
}

/* MOBILE */
@media(max-width: 600px){
    .container {
        padding: 10px;
    }
}
</style>
</head>

<body>

<div class="header">🚀 FBA Finder Pro</div>

<div class="container">

    <!-- RECHERCHE -->
    <div class="card">
       <h2>🔎 Recherche produit</h2>

<input type="text" id="keyword" placeholder="Ex : lego">

<select id="marketplace">
    <option>Amazon</option>
    <option>Cdiscount</option>
    <option>Fnac</option>
</select>

<input type="number" id="minProfit" placeholder="Profit minimum (€)">
<input type="number" id="maxBuyPrice" placeholder="Prix achat max (€)">
<input type="number" id="minRoi" placeholder="ROI minimum (%)">

<button onclick="search()">Rechercher</button>

<button onclick="scanDeals()" style="margin-top:10px;background:linear-gradient(90deg,#00c853,#64dd17)">
🔥 Scanner promos
</button>

<div class="result" id="searchResult">Résultats ici...</div>

    <!-- CALCUL -->
    <div class="card">
       <h2>💰 Calcul rentabilité</h2>

<input type="number" id="buyPrice" placeholder="Prix achat">
<input type="number" id="amazonPrice" placeholder="Prix Amazon">
<input type="number" id="amazonFees" placeholder="Frais Amazon">

<button onclick="calculateProfit()">Calculer</button>

<div class="result" id="calcResult">Résultat...</div>
    </div>

<script>
function search() {
    const keyword = document.getElementById("keyword").value || "Produit";
    const marketplace = document.getElementById("marketplace").value;
    const result = document.getElementById("searchResult");

    result.innerHTML = `Recherche en cours sur ${marketplace} pour : <b>${keyword}</b>...`;
}

function scanDeals() {
    const minProfit = parseFloat(document.getElementById("minProfit").value) || 0;
    const maxBuyPrice = parseFloat(document.getElementById("maxBuyPrice").value) || 9999;
    const minRoi = parseFloat(document.getElementById("minRoi").value) || 0;

    const result = document.getElementById("searchResult");
    result.innerHTML = "Scan en cours... 🔍";

    const deals = [
        { name: "Lego Set", buy: 15, sell: 29.99, fees: 7 },
        { name: "Coffret Manga", buy: 22, sell: 39.99, fees: 8 },
        { name: "Shampoing Lot", buy: 9.90, sell: 21.99, fees: 5 },
        { name: "Crème soin", buy: 11, sell: 24.50, fees: 6 }
    ];

    setTimeout(() => {
       let html = `
<table style="width:100%;border-collapse:collapse;color:white;">
<tr style="background:#222;">
    <th>Produit</th>
    <th>Achat</th>
    <th>Revente</th>
    <th>Frais</th>
    <th>Profit</th>
    <th>ROI</th>
</tr>
`;

deals.forEach(deal => {
    const profit = deal.sell - deal.buy - deal.fees;
    const roi = (profit / deal.buy) * 100;

    if (profit >= minProfit && deal.buy <= maxBuyPrice && roi >= minRoi) {
        html += `
        <tr style="text-align:center;border-bottom:1px solid #333;">
            <td>${deal.name}</td>
            <td>${deal.buy.toFixed(2)}€</td>
            <td>${deal.sell.toFixed(2)}€</td>
            <td>${deal.fees.toFixed(2)}€</td>
            <td style="color:#00e676;">${profit.toFixed(2)}€</td>
            <td>${roi.toFixed(1)}%</td>
        </tr>
        `;
    }
});

html += "</table>";

        result.innerHTML = html || "Aucune promo trouvée avec tes filtres.";
    }, 1200);
}

function calculateProfit() {
    const buyPrice = parseFloat(document.getElementById("buyPrice").value) || 0;
    const amazonPrice = parseFloat(document.getElementById("amazonPrice").value) || 0;
    const amazonFees = parseFloat(document.getElementById("amazonFees").value) || 0;

    const profit = amazonPrice - buyPrice - amazonFees;
    const roi = buyPrice > 0 ? (profit / buyPrice) * 100 : 0;

    const result = document.getElementById("calcResult");

    result.innerHTML = `
        💰 Profit net : <b>${profit.toFixed(2)}€</b><br>
        📈 ROI : <b>${roi.toFixed(1)}%</b>
    `;
}
<script>
function search() {
    const keyword = document.getElementById("keyword").value || "Produit";
    const marketplace = document.getElementById("marketplace").value;
    const result = document.getElementById("searchResult");

    result.innerHTML = `Recherche en cours sur ${marketplace} pour : <b>${keyword}</b>...`;
}

function scanDeals() {
    const minProfit = parseFloat(document.getElementById("minProfit").value) || 0;
    const maxBuyPrice = parseFloat(document.getElementById("maxBuyPrice").value) || 9999;
    const minRoi = parseFloat(document.getElementById("minRoi").value) || 0;

    const result = document.getElementById("searchResult");
    result.innerHTML = "Scan en cours... 🔍";

    const deals = [
        { name: "Lego Set", buy: 15, sell: 29.99, fees: 7 },
        { name: "Coffret Manga", buy: 22, sell: 39.99, fees: 8 },
        { name: "Shampoing Lot", buy: 9.90, sell: 21.99, fees: 5 },
        { name: "Crème soin", buy: 11, sell: 24.50, fees: 6 }
    ];

    setTimeout(() => {
        let filteredDeals = [];

        deals.forEach(deal => {
            const profit = deal.sell - deal.buy - deal.fees;
            const roi = (profit / deal.buy) * 100;

            if (profit >= minProfit && deal.buy <= maxBuyPrice && roi >= minRoi) {
                filteredDeals.push({
                    ...deal,
                    profit,
                    roi
                });
            }
        });

        filteredDeals.sort((a, b) => b.profit - a.profit);

        if (filteredDeals.length === 0) {
            result.innerHTML = "Aucune promo trouvée avec tes filtres.";
            return;
        }

        let html = `
        <table style="width:100%;border-collapse:collapse;color:white;">
        <tr style="background:#222;">
            <th style="padding:10px;">Produit</th>
            <th style="padding:10px;">Achat</th>
            <th style="padding:10px;">Revente</th>
            <th style="padding:10px;">Frais</th>
            <th style="padding:10px;">Profit</th>
            <th style="padding:10px;">ROI</th>
            <th style="padding:10px;">Statut</th>
        </tr>
        `;

        filteredDeals.forEach((deal, index) => {
            html += `
            <tr style="text-align:center;border-bottom:1px solid #333;">
                <td style="padding:10px;">${deal.name}</td>
                <td style="padding:10px;">${deal.buy.toFixed(2)}€</td>
                <td style="padding:10px;">${deal.sell.toFixed(2)}€</td>
                <td style="padding:10px;">${deal.fees.toFixed(2)}€</td>
                <td style="padding:10px;color:#00e676;"><b>${deal.profit.toFixed(2)}€</b></td>
                <td style="padding:10px;"><b>${deal.roi.toFixed(1)}%</b></td>
                <td style="padding:10px;">
                    ${index === 0 
                        ? '<span style="background:#ffd700;color:black;padding:5px 10px;border-radius:20px;font-weight:bold;">BEST DEAL</span>'
                        : '<span style="background:#1f2a3a;color:#8ab4ff;padding:5px 10px;border-radius:20px;">Bon deal</span>'
                    }
                </td>
            </tr>
            `;
        });

        html += `</table>`;
        result.innerHTML = html;
    }, 1200);
}

function calculateProfit() {
    const buyPrice = parseFloat(document.getElementById("buyPrice").value) || 0;
    const amazonPrice = parseFloat(document.getElementById("amazonPrice").value) || 0;
    const amazonFees = parseFloat(document.getElementById("amazonFees").value) || 0;

    const profit = amazonPrice - buyPrice - amazonFees;
    const roi = buyPrice > 0 ? (profit / buyPrice) * 100 : 0;

    const result = document.getElementById("calcResult");

    result.innerHTML = `
        💰 Profit net : <b>${profit.toFixed(2)}€</b><br>
        📈 ROI : <b>${roi.toFixed(1)}%</b>
    `;
}
</script>
