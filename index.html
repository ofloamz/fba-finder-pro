<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FBA Finder Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1115;
    color: white;
}

/* HEADER */
.header {
    background: #151821;
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 1px solid #222;
}

/* CONTAINER */
.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 20px;
}

/* CARD */
.card {
    background: #1a1d26;
    padding: 20px;
    border-radius: 12px;
    margin-bottom: 25px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}

/* TITRE */
h2 {
    margin-bottom: 15px;
}

/* INPUT */
input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: none;
    background: #2a2e3a;
    color: white;
}

/* BOUTON */
button {
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(90deg, #4f8cff, #6a5cff);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: scale(1.02);
    opacity: 0.9;
}

/* RESULT */
.result {
    margin-top: 10px;
    padding: 10px;
    background: #111;
    border-radius: 8px;
}

/* MOBILE */
@media(max-width: 600px){
    .container {
        padding: 10px;
    }
}
</style>
</head>

<body>

<div class="header">🚀 FBA Finder Pro</div>

<div class="container">

    <!-- RECHERCHE -->
    <div class="card">
        <h2>🔍 Recherche produit</h2>
        <input type="text" placeholder="Ex : lego">
        <select>
            <option>Amazon</option>
            <option>Cdiscount</option>
            <option>Fnac</option>
        </select>
        <button>Rechercher</button>
        <div class="result">Résultats ici...</div>
    </div>

    <!-- CALCUL -->
    <div class="card">
        <h2>💰 Calcul rentabilité</h2>
        <input type="number" placeholder="Prix achat">
        <input type="number" placeholder="Prix Amazon">
        <input type="number" placeholder="Frais Amazon">
        <button>Calculer</button>
        <div class="result">Résultat...</div>
    </div>

</div>

</body>
</html>
